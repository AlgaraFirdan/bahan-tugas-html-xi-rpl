<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTML</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"> 
</head>
<body>
    <form action="">
        <h1>Buat Akun Baru 🚀</h1>
        <h3>Mohon Mengisi Data Anda</h3>
        
        <p>First Name:</p>
        <label for="first-name"></label>
        <input type="text" id="first-name" placeholder="Nama Depan">

        <p>Last Name:</p>
        <label for="last-name"></label>
        <input type="text" id="last-name" placeholder="Nama Belakang">

        <p>Gender:</p>
        <input type="radio" id="Laki-Laki" name="Gender">
        <label for="Laki-Laki">Laki-Laki</label><br>
        <input type="radio" id="Perempuan" name="Gender">
        <label for="Perempuan">Perempuan</label>

        <p>Nationality:</p>
        <select name="Nationality" id="Nationality">
            <option value="Indonesia">Indonesia</option>
            <option value="Inggris">Inggris</option>
        </select>

        <p>Language Spoken:</p>
        <input type="checkbox" id="Bahasa-Indonesia" name="Bahasa">
        <label for="Bahasa-Indonesia">Bahasa Indonesia</label><br>
        <input type="checkbox" id="English" name="Bahasa">
        <label for="English">English</label><br>
        <input type="checkbox" id="Other" name="Bahasa">
        <label for="Other">Other</label>

        <p>Bio:</p>
        <textarea name="Bio" rows="4" placeholder="Ceritakan tentang diri Anda..."></textarea>

        <p>
            <a href="welcome.html">
                <input type="button" name="sign up" id="sign-up" value="Sign Up">
            </a>
        </p>
    </form>
</body>
</html>
